let data=structuredClone(fallback);let rows=[];let source='Offline snapshot';let active=localStorage.getItem('pq_tab')||'home';
function money(s){return String(s||'').replace(/\B(?=(\d{3})+(?!\d))/g,'.')} function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2400)}
function csvParse(text){const out=[];let row=[],v='',q=false;for(let i=0;i<text.length;i++){const c=text[i],n=text[i+1];if(q){if(c==='"'&&n==='"'){v+='"';i++}else if(c==='"')q=false;else v+=c}else{if(c==='"')q=true;else if(c===','){row.push(v);v=''}else if(c==='\n'){row.push(v);out.push(row);row=[];v=''}else if(c!=='\r')v+=c}}row.push(v);out.push(row);return out.map(r=>r.map(x=>x.trim())).filter(r=>r.some(Boolean))}
function between(title,nextTitle){const s=rows.findIndex(r=>(r[0]||'').includes(title));if(s<0)return[];let e=nextTitle?rows.findIndex((r,i)=>i>s&&(r[0]||'').includes(nextTitle)):rows.length;if(e<0)e=rows.length;return rows.slice(s+2,e).filter(r=>r.some(Boolean)&&!/^\d+\)/.test(r[0]||''));}
function parseRows(){if(!rows.length)return;data.summary=between('TÓM TẮT','LỊCH TRÌNH').filter(r=>r[0]&&r[0]!=='Hạng mục').map(r=>[r[0],r[1],r[3],r[4],r[5],r[6]]);data.events=between('LỊCH TRÌNH','PLAN B').filter(r=>r[0]&&r[0]!=='Ngày').map(r=>[r[0],r[1],r[2],r[3],r[4],r[5],r[6],r[7]]);data.planb=between('PLAN B','BẢNG TÍNH').filter(r=>r[0]&&r[0]!=='Tình huống').map(r=>[r[0],r[1],r[2],r[4]]);data.costs=between('BẢNG TÍNH','CHIA TIỀN').filter(r=>r[0]&&r[0]!=='Khoản mục'&&r[0]!=='TỔNG DỰ KIẾN').map(r=>[r[0],r[1],r[5],r[7],r[8],r[9],r[6]]);data.people=between('CHIA TIỀN','CHECKLIST').filter(r=>r[0]&&r[0]!=='Thành viên'&&r[0]!=='Lưu ý').map(r=>[r[0],r[2],r[3],r[4]]);data.checklist=between('CHECKLIST','QUÁN ĂN').filter(r=>r[0]&&r[0]!=='Nhóm').map(r=>[r[0],r[1],r[2],r[3],r[5]]);data.places=between('QUÁN ĂN','NGUỒN').filter(r=>r[0]&&r[0]!=='Nhóm').map(r=>[r[0],r[1],r[2],r[3],r[5]]);}
async function loadSheet(){try{document.getElementById('refreshBtn').disabled=true;const res=await fetch(CSV_URL+'&_='+Date.now(),{cache:'no-store'});if(!res.ok)throw new Error(res.status);const text=await res.text();if(text.includes('<!DOCTYPE html')||text.includes('Google Docs'))throw new Error('Sheet is not public');rows=csvParse(text);parseRows();source='Google Sheet live · '+new Date().toLocaleString('vi-VN');localStorage.setItem('pq_last_rows',JSON.stringify(rows));render();toast('Đã refresh từ Google Sheet')}catch(e){const saved=localStorage.getItem('pq_last_rows');if(saved){rows=JSON.parse(saved);parseRows();source='Cache từ lần refresh trước'}else source='Offline snapshot · Sheet cần public/publish để web tự cập nhật';render();toast('Không đọc được Sheet live, đang dùng bản dự phòng')}finally{document.getElementById('refreshBtn').disabled=false}}
function setActive(id){active=id;localStorage.setItem('pq_tab',id);render()}function maps(q){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(q+' Phú Quý Bình Thuận')}
function renderTabs(){const t=document.getElementById('tabs'),b=document.getElementById('bottomNav');t.innerHTML=tabs.map(x=>`<button class="tab ${active===x[0]?'active':''}" onclick="setActive('${x[0]}')">${x[2]} ${x[1]}</button>`).join('');b.innerHTML=tabs.slice(0,5).map(x=>`<button class="${active===x[0]?'active':''}" onclick="setActive('${x[0]}')"><div>${x[2]}</div><div>${x[1]}</div></button>`).join('')}
function nextEvent(){const now=new Date();const y=now.getFullYear();const map={'02/07':`${y}-07-02`,'03/07':`${y}-07-03`,'04/07':`${y}-07-04`,'05/07':`${y}-07-05`};let best=null;for(const e of data.events){const d=Object.keys(map).find(k=>e[0].includes(k));const st=(e[1]||'').split('–')[0].replace('h',':');if(!d||!st.includes(':'))continue;const date=new Date(map[d]+'T'+st.padStart(5,'0')+':00');if(date>=now&&(!best||date<best.date))best={date,e}}return best}
function home(){const total=data.costs.reduce((s,r)=>s+Number(String(r[2]).replace(/\D/g,'')),0);const next=nextEvent();return `<section class="section active"><div class="card sheet-note"><div><span class="pill ${source.startsWith('Google')?'ok':'warn'}">${source}</span><p class="muted small">Sửa nội dung trong Sheet rồi bấm Refresh data. Checklist tick trong web được lưu riêng trên máy.</p></div><a class="btn ghost" target="_blank" href="${SHEET_URL}">Sửa Sheet</a></div><div class="kpis"><div class="kpi"><b>6 người</b><span class="muted">3 nam · 3 nữ</span></div><div class="kpi"><b>3N2Đ</b><span class="muted">02/07 tối–05/07</span></div><div class="kpi"><b>${money(total||18222249)}đ</b><span class="muted">Tổng dự kiến</span></div><div class="kpi"><b>${money(data.people[0]?.[1]||3037042)}đ</b><span class="muted">Tạm thu/người</span></div></div>${next?`<div class="card"><span class="pill ok">Việc tiếp theo</span><h2>${next.e[2]}</h2><p class="muted"><b>${next.e[0]} · ${next.e[1]}</b><br>${next.e[3]}</p><button class="btn primary" onclick="setActive('timeline')">Mở lịch trình</button></div>`:''}<div class="card"><h2>Việc cần chốt trước 01/07</h2><div class="grid">${data.summary.filter(r=>String(r[5]).includes('Chưa')||String(r[5]).includes('Cần')).map(r=>`<div class="row"><div><b>${r[0]}</b><div class="muted small">${r[1]} · ${r[2]||''}</div></div><span class="pill warn">${r[5]}</span></div>`).join('')}</div></div><div class="card"><h2>Booking quan trọng</h2>${data.summary.slice(0,5).map(r=>`<details><summary>${r[0]} · ${r[5]||''}</summary><p>${r[1]||''}</p><p class="muted small">${r[2]||''}<br>${r[3]||''}<br>${r[4]||''}</p></details>`).join('')}</div></section>`}
function timeline(){let day='';return `<section class="section active" id="timeline"><div class="card"><h2>Lịch trình</h2><p class="muted small">Card sáng màu xanh là mốc tiếp theo nếu web nhận diện được thời gian.</p></div><div class="timeline">${data.events.map((e,i)=>{let head='';if(e[0]!==day){day=e[0];head=`<div class="day-title">${day}</div>`}return head+`<article class="event"><div class="time">${e[1]||''}</div><h3>${e[2]||''}</h3><div class="meta"><div>📍 <span>${e[3]||''}</span></div><div>🛵 <span>${e[4]||''}</span></div><div>✅ <span>${e[5]||''}</span></div><div>🌧️ <span>${e[6]||''}</span></div><div>💸 <b>${e[7]||''}</b></div></div>${e[3]?`<a class="btn ghost" target="_blank" href="${maps(e[3])}" style="display:block;margin-top:12px">Mở Maps</a>`:''}</article>`}).join('')}</div></section>`}
function costs(){const total=data.costs.reduce((s,r)=>s+Number(String(r[2]).replace(/\D/g,'')),0);return `<section class="section active"><div class="card"><h2>Chi phí & chia tiền</h2><div class="kpis"><div class="kpi"><b>${money(total)}đ</b><span class="muted">Tổng dự kiến</span></div><div class="kpi"><b>${money(Math.round(total/6))}đ</b><span class="muted">/người</span></div></div></div><div class="card"><h3>Người cần chuyển/nhận</h3>${data.people.map(p=>`<div class="row"><div><b>${p[0]}</b><div class="muted small">Phải góp ${p[1]} · đã ứng ${p[2]}</div></div><div class="money ${String(p[3]).startsWith('-')?'negative':'positive'}">${p[3]}</div></div>`).join('')}<button class="btn primary" style="width:100%;margin-top:12px" onclick="copySettlement()">Copy bảng chia tiền</button></div><div class="card"><h3>Khoản mục</h3>${data.costs.map(c=>`<details><summary>${c[0]} · ${c[4]}/người</summary><p class="muted small">Loại: ${c[1]} · Người trả: ${c[6]} · Trạng thái: ${c[5]}</p><div class="money">${c[2]}đ</div></details>`).join('')}</div></section>`}
function checklist(){const done=JSON.parse(localStorage.getItem('pq_done')||'{}');return `<section class="section active"><div class="card"><h2>Checklist</h2><p class="muted small">Tick ở đây chỉ lưu trên điện thoại của bạn, không ghi ngược lên Sheet.</p></div>${data.checklist.map((c,i)=>`<label class="check ${done[i]?'done':''}"><input type="checkbox" ${done[i]?'checked':''} onchange="toggleDone(${i},this.checked)"><div><b class="label">${c[1]}</b><div class="muted small">${c[0]} · ${c[2]} · ${c[3]} · ${c[4]}</div></div></label>`).join('')}</section>`}
function food(){return `<section class="section active"><div class="card"><h2>Ăn uống / địa điểm / tiện ích</h2><input class="search" id="placeSearch" placeholder="Tìm: hải sản, bò nóng, y tế..." oninput="renderPlaces(this.value)"></div><div id="places"></div></section>`}
function renderPlaces(q=''){const wrap=document.getElementById('places');if(!wrap)return;const list=data.places.filter(p=>p.join(' ').toLowerCase().includes(q.toLowerCase()));wrap.innerHTML=list.map(p=>`<article class="card"><span class="pill">${p[0]}</span><h3>${p[1]}</h3><p class="muted">${p[2]}</p><p>${p[3]||''}</p><div class="row"><span>Giá dự kiến</span><b>${p[4]||''}</b></div><a class="btn ghost" target="_blank" href="${maps(p[1]+' '+p[2])}">Mở Maps</a></article>`).join('')||'<div class="empty">Không tìm thấy.</div>'}
function planb(){return `<section class="section active"><div class="card"><h2>Plan B nhanh</h2><p class="muted small">Dùng khi mưa, sóng lớn, say sóng, trễ tàu/xe hoặc không thuê được xe máy.</p></div>${data.planb.map(p=>`<article class="card"><span class="pill warn">Tình huống</span><h3>${p[0]}</h3><p><b>Đổi lịch:</b> ${p[1]}</p><p class="muted"><b>Điểm thay thế:</b> ${p[2]}</p><p class="muted"><b>An toàn:</b> ${p[3]}</p></article>`).join('')}<div class="card"><h3>Liên hệ nhanh</h3><a class="btn ghost" target="_blank" href="https://online.superdong.com.vn/">Superdong</a><a class="btn ghost" target="_blank" style="margin-top:8px;display:block" href="https://futabus.vn/lich-trinh">FUTA</a></div></section>`}
function render(){renderTabs();const map={home,timeline,costs,checklist,food,planb};document.getElementById('main').innerHTML=map[active]();if(active==='food')renderPlaces();window.scrollTo({top:0,behavior:'smooth'}) }
function toggleDone(i,v){const done=JSON.parse(localStorage.getItem('pq_done')||'{}');done[i]=v;localStorage.setItem('pq_done',JSON.stringify(done));render()}function copySettlement(){const t=data.people.map(p=>`${p[0]}: ${p[3].startsWith('-')?'được nhận':'cần chuyển'} ${p[3].replace('-','')}đ`).join('\n');navigator.clipboard.writeText(t);toast('Đã copy bảng chia tiền')}document.getElementById('refreshBtn').onclick=loadSheet;document.getElementById('shareBtn').onclick=()=>{navigator.clipboard.writeText(location.href);toast('Đã copy link web')};document.body.addEventListener('click',e=>{const id=e.target?.dataset?.open;if(id)setActive(id)});render();loadSheet();
</script>
