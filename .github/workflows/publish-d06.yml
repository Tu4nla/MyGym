name: Publish D06 metadata
on:
  push:
    branches: [handbook/d06-compose-viewmodel]
permissions:
  contents: write
jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: handbook/d06-compose-viewmodel
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/publish_d06.py
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add android-learning/data/lessons/d/d06.json android-learning/data/catalog.json android-learning/data/search-index.json android-learning/data/book-plan.json validation-d06.json
          git diff --cached --quiet || git commit -m "docs(android-learning): publish D06 metadata and validation"
          git push origin HEAD:handbook/d06-compose-viewmodel
