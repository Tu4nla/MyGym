name: Publish D05 metadata

on:
  push:
    branches:
      - handbook/d05-stability-recomposition

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: handbook/d05-stability-recomposition
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate lesson and update metadata
        run: python scripts/publish_d05.py
      - name: Commit generated metadata
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add android-learning/data/lessons/d/d05.json android-learning/data/catalog.json android-learning/data/search-index.json android-learning/data/book-plan.json validation-d05.json
          git diff --cached --quiet || git commit -m "docs(android-learning): publish D05 metadata and validation"
          git push origin HEAD:handbook/d05-stability-recomposition
