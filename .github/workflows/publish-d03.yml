name: Publish D03 metadata

on:
  push:
    branches:
      - handbook/d03-remember-remember-saveable

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: handbook/d03-remember-remember-saveable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate lesson and update metadata
        run: python scripts/publish_d03.py
      - name: Commit generated metadata
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add android-learning/data/lessons/d/d03.json android-learning/data/catalog.json android-learning/data/search-index.json android-learning/data/book-plan.json validation-d03.json
          git diff --cached --quiet || git commit -m "docs(android-learning): publish D03 metadata and validation"
          git push origin HEAD:handbook/d03-remember-remember-saveable
