name: Publish C02 C03 C04 Deep

on:
  push:
    branches:
      - handbook/c02-c04-deep
    paths:
      - android-learning/data/lessons/c/c02.json
      - android-learning/data/lessons/c/c03.json
      - android-learning/data/lessons/c/c04.json
      - scripts/publish_c02_c04_deep.py
      - .github/workflows/publish-c02-c04-deep.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: handbook/c02-c04-deep
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate depth and generate metadata
        run: python scripts/publish_c02_c04_deep.py
      - name: Commit generated metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android-learning/data/catalog.json android-learning/data/book-plan.json android-learning/data/search-index.json
          if git diff --cached --quiet; then
            echo "No generated metadata changes"
          else
            git commit -m "docs(android): publish C02 C03 C04"
            git push origin HEAD:handbook/c02-c04-deep
          fi
