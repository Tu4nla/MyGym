name: Publish B05 once

on:
  push:
    branches:
      - handbook/publish-b05

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Publish and validate B05
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          root = Path('android-learning')
          catalog_path = root / 'data/catalog.json'
          plan_path = root / 'data/book-plan.json'
          search_path = root / 'data/search-index.json'
          lesson_path = root / 'data/lessons/b/b05.json'

          catalog = json.loads(catalog_path.read_text())
          b05 = next(
              lesson
              for chapter in catalog['chapters'] if chapter['id'] == 'b'
              for lesson in chapter['lessons'] if lesson['id'] == 'b05'
          )
          assert b05['path'] == 'data/lessons/b/b05.json'
          b05['status'] = 'published'
          b05['estimatedMinutes'] = 180

          plan = json.loads(plan_path.read_text())
          assert plan['current'] == 'b05', plan['current']
          if 'b05' not in plan['completed']:
              plan['completed'].append('b05')
          plan['current'] = 'b06'

          lesson = json.loads(lesson_path.read_text())
          assert lesson['id'] == 'b05'
          assert lesson['estimatedMinutes'] == 180
          section_ids = [section['id'] for section in lesson['sections']]
          assert len(section_ids) == len(set(section_ids)), 'duplicate section IDs'
          assert len(lesson.get('quiz', [])) >= 10
          for q in lesson['quiz']:
              assert q.get('options'), q.get('id')
              assert q.get('explanation'), q.get('id')
              assert ('correctOptionIds' in q) or ('answerIndex' in q) or ('answerIndexes' in q), q.get('id')

          index = json.loads(search_path.read_text())
          entry = {
              'lessonId': 'b05',
              'code': 'B05',
              'title': 'Dispatcher và Thread Pool',
              'keywords': ['CoroutineDispatcher','thread pool','Dispatchers.Main','Dispatchers.IO','Dispatchers.Default','Dispatchers.Unconfined','limitedParallelism','I/O-bound','CPU-bound','blocking','suspending','context switch','starvation','dispatcher injection','Upzi'],
              'headings': ['Dispatcher là gì','Thread pool, queue và worker','Main, IO, Default và Unconfined','I/O-bound và CPU-bound','Context switching và starvation','limitedParallelism','Dispatcher injection','Yêu cầu sản phẩm Upzi','Trade-off và edge cases','Câu hỏi phỏng vấn']
          }
          index = [item for item in index if item.get('lessonId') != 'b05'] + [entry]

          catalog_path.write_text(json.dumps(catalog, ensure_ascii=False, indent=2) + '\n')
          plan_path.write_text(json.dumps(plan, ensure_ascii=False, indent=2) + '\n')
          search_path.write_text(json.dumps(index, ensure_ascii=False, indent=2) + '\n')
          PY
          rm .github/workflows/publish-b05-once.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add android-learning/data/catalog.json android-learning/data/book-plan.json android-learning/data/search-index.json .github/workflows/publish-b05-once.yml
          git commit -m "docs(android): publish B05 and advance to B06"
          git push
