name: Publish D08
on:
  push:
    branches: [handbook/d08-modifier-v2]
permissions:
  contents: write
jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: handbook/d08-modifier-v2
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python scripts/publish_d08.py
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add android-learning/data/lessons/d/d08.json android-learning/data/catalog.json android-learning/data/search-index.json android-learning/data/book-plan.json validation-d08.json
          git diff --cached --quiet || git commit -m "docs(android-learning): publish D08 content and metadata"
          git push origin HEAD:handbook/d08-modifier-v2
