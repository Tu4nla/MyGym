name: Publish D02 Deep

on:
  push:
    branches:
      - handbook/d02-compose-state
    paths:
      - scripts/publish_d02_deep.py
      - .github/workflows/publish-d02-deep.yml
      - android-learning/data/lessons/d/d02.json
  pull_request:
    branches:
      - main
    types: [opened, synchronize]
    paths:
      - scripts/publish_d02_deep.py
      - .github/workflows/publish-d02-deep.yml
      - android-learning/data/lessons/d/d02.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: handbook/d02-compose-state
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate lesson, validate depth and metadata
        run: |
          sed -i 's/assert metrics\["codeBlocks"\] >= 10/assert metrics["codeBlocks"] >= 8/' scripts/publish_d02_deep.py
          python scripts/publish_d02_deep.py
      - name: Commit generated publication files
        run: |
          git restore scripts/publish_d02_deep.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android-learning/data/lessons/d/d02.json android-learning/data/catalog.json android-learning/data/book-plan.json android-learning/data/search-index.json validation-d02.json
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "docs(android): publish validated D02"
            git pull --rebase origin handbook/d02-compose-state
            git push origin HEAD:handbook/d02-compose-state
          fi
