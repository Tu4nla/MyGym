name: Publish B07

on:
  push:
    branches:
      - handbook/b07-exception-handling
    paths:
      - scripts/publish_b07.py
      - .github/workflows/publish-b07.yml
      - android-learning/data/lessons/b/b07.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: handbook/b07-exception-handling
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Publish and validate B07
        run: python scripts/publish_b07.py
      - name: Commit generated metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android-learning/data/catalog.json android-learning/data/book-plan.json android-learning/data/search-index.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs(android): publish B07 Exception Handling"
            git push origin HEAD:handbook/b07-exception-handling
          fi
