name: Publish B06

on:
  push:
    branches:
      - handbook/publish-b06
    paths:
      - scripts/publish_b06.py
      - .github/workflows/publish-b06.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: handbook/publish-b06
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Publish and validate B06
        run: python scripts/publish_b06.py
      - name: Commit generated metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android-learning/data/catalog.json android-learning/data/book-plan.json android-learning/data/search-index.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs(android): publish B06 Job and Cancellation"
            git push origin HEAD:handbook/publish-b06
          fi
