name: Publish C08 Deep

on:
  push:
    branches:
      - handbook/c08-debounce-search-deep
    paths:
      - scripts/publish_c08_deep.py
      - .github/workflows/publish-c08-deep.yml
  pull_request:
    branches:
      - main
    types: [opened, synchronize]
    paths:
      - scripts/publish_c08_deep.py
      - .github/workflows/publish-c08-deep.yml
      - android-learning/data/lessons/c/c08.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: handbook/c08-debounce-search-deep
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate lesson, validate depth, and update metadata
        run: python scripts/publish_c08_deep.py
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android-learning/data/lessons/c/c08.json android-learning/data/catalog.json android-learning/data/book-plan.json android-learning/data/search-index.json validation-c08.json
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "docs(android): publish validated C08"
            git pull --rebase origin handbook/c08-debounce-search-deep
            git push origin HEAD:handbook/c08-debounce-search-deep
          fi
