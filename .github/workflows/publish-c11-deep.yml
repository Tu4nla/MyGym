name: Publish C11 Deep

on:
  push:
    branches:
      - handbook/c11-flow-testing-deep
    paths:
      - scripts/c11_payload.txt
      - scripts/publish_c11_deep.py
      - .github/workflows/publish-c11-deep.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: handbook/c11-flow-testing-deep
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Generate lesson, validate depth, and update metadata
        run: python scripts/publish_c11_deep.py
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android-learning/data/lessons/c/c11.json android-learning/data/catalog.json android-learning/data/book-plan.json android-learning/data/search-index.json validation-c11.json
          if git diff --cached --quiet; then
            echo "No generated changes"
          else
            git commit -m "docs(android): publish validated C11"
            git pull --rebase origin handbook/c11-flow-testing-deep
            git push origin HEAD:handbook/c11-flow-testing-deep
          fi
