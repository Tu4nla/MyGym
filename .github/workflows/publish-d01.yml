name: Publish D01 metadata

on:
  push:
    branches:
      - handbook/d01-declarative-ui-compose-runtime

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: handbook/d01-declarative-ui-compose-runtime
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate lesson and update metadata
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path.cwd()
          data = root / 'android-learning' / 'data'
          lesson_path = data / 'lessons' / 'd' / 'd01.json'
          lesson = json.loads(lesson_path.read_text())

          assert lesson['id'] == 'd01'
          sections = lesson['sections']
          ids = [section['id'] for section in sections]
          assert len(sections) == 24
          assert len(ids) == len(set(ids)) == 24

          paragraphs = [
              block['content']
              for section in sections
              for block in section.get('blocks', [])
              if block.get('type') == 'paragraph'
          ]
          code_blocks = [
              block
              for section in sections
              for block in section.get('blocks', [])
              if block.get('type') == 'code'
          ]
          quiz_blocks = [
              block
              for section in sections
              for block in section.get('blocks', [])
              if block.get('type') == 'quiz'
          ]
          assert len(quiz_blocks) == 1
          quiz = quiz_blocks[0]['questions']
          lesson['quiz'] = quiz

          for question in quiz:
              option_ids = {str(option['id']) for option in question['options']}
              answer_ids = set(map(str, question['correctOptionIds']))
              assert answer_ids and answer_ids.issubset(option_ids)
              assert question.get('explanation', '').strip()

          text = json.dumps(lesson, ensure_ascii=False)
          assert len(paragraphs) >= 35
          assert sum(map(len, paragraphs)) >= 12000
          assert len(code_blocks) >= 6
          assert len(quiz) >= 10
          assert all(label in text for label in ('confirmed', 'inferred', 'proposed', 'needs-confirmation'))
          lesson_path.write_text(json.dumps(lesson, ensure_ascii=False, indent=2) + '\n')

          catalog_path = data / 'catalog.json'
          catalog = json.loads(catalog_path.read_text())
          chapter = next(ch for ch in catalog['chapters'] if ch['id'] == 'd')
          entry = next(item for item in chapter['lessons'] if item['id'] == 'd01')
          assert entry['status'] in ('planned', 'published')
          entry['status'] = 'published'
          entry['estimatedMinutes'] = lesson['estimatedMinutes']
          catalog_path.write_text(json.dumps(catalog, ensure_ascii=False, indent=2) + '\n')

          plan_path = data / 'book-plan.json'
          plan = json.loads(plan_path.read_text())
          assert plan['current'] in ('d01', 'd02')
          if 'd01' not in plan['completed']:
              plan['completed'].append('d01')
          plan['current'] = 'd02'
          plan_path.write_text(json.dumps(plan, ensure_ascii=False, indent=2) + '\n')

          index_path = data / 'search-index.json'
          index = json.loads(index_path.read_text())
          index = [item for item in index if item['lessonId'] != 'd01']
          index.append({
              'lessonId': 'd01',
              'code': 'D01',
              'title': 'Declarative UI và Compose Runtime',
              'keywords': [
                  'declarative UI', 'Jetpack Compose', 'Compose Runtime', 'composition',
                  'recomposition', 'Composer', 'slot table', 'snapshot state',
                  'Recomposer', 'Applier', 'remember', 'positional memoization',
                  'key', 'stability', 'skippable', 'restartable'
              ],
              'headings': [
                  'Declarative UI và imperative UI',
                  'Compiler transform và Composer',
                  'Composition, recomposition và apply changes',
                  'Snapshot state và invalidation',
                  'Slot table và remember',
                  'Identity, key và positional memoization',
                  'Stability và skippability',
                  'State ownership và side-effect boundary'
              ]
          })
          index_path.write_text(json.dumps(index, ensure_ascii=False, indent=2) + '\n')

          report = {
              'id': 'd01',
              'sections': len(sections),
              'uniqueSectionIds': len(set(ids)),
              'paragraphs': len(paragraphs),
              'paragraphCharacters': sum(map(len, paragraphs)),
              'codeBlocks': len(code_blocks),
              'quizQuestions': len(quiz),
              'truthfulnessLabelsPresent': True,
              'nextLesson': plan['current']
          }
          (root / 'validation-d01.json').write_text(json.dumps(report, ensure_ascii=False, indent=2) + '\n')

          for ch in catalog['chapters']:
              for item in ch['lessons']:
                  if item['status'] == 'published':
                      assert (root / 'android-learning' / item['path']).exists(), item['path']
          print(json.dumps(report, ensure_ascii=False, indent=2))
          PY
      - name: Commit generated metadata
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add android-learning/data/lessons/d/d01.json android-learning/data/catalog.json android-learning/data/search-index.json android-learning/data/book-plan.json validation-d01.json
          git diff --cached --quiet || git commit -m "docs(android-learning): publish D01 metadata and validation"
          git push origin HEAD:handbook/d01-declarative-ui-compose-runtime
