<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#121214"><title>MyGym</title><style>html,body{margin:0;background:#121214;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}#boot{min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center}.spin{width:38px;height:38px;border:4px solid #333;border-top-color:#FF5722;border-radius:50%;animation:s .8s linear infinite;margin:0 auto 14px}@keyframes s{to{transform:rotate(360deg)}}p{color:#aaa;line-height:1.5}</style></head><body><div id="boot"><div><div class="spin"></div><b>Đang mở giáo án MyGym…</b><p>Trang sẽ hiển thị sau vài giây.</p></div></div><script src="payload-0.js"></script><script src="payload-1.js"></script><script src="payload-2.js"></script><script src="payload-3.js"></script><script src="payload-4.js"></script><script src="payload-5.js"></script><script>(async()=>{try{const raw=atob((window.__MYGYM_PARTS||[]).join(''));const bytes=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));const page=await new Response(stream).text();document.open();document.write(page);document.close();}catch(e){document.getElementById('boot').innerHTML='<div><b>Không thể khởi tạo trang</b><p>'+String(e)+'</p></div>';}})();</script></body></html>
