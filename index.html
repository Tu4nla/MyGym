<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#121214">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>MyGym — Giáo án 4 buổi</title>
  <link rel="stylesheet" href="style-a.css?v=8">
  <link rel="stylesheet" href="style-extra.css?v=8">
  <link rel="stylesheet" href="replacement-styles.css?v=8">
  <link rel="stylesheet" href="muscle-styles.css?v=8">
</head>
<body>
  <div class="app">
    <header class="hero">
      <div class="eyebrow"><span></span> MyGym Mobile Guide</div>
      <h1 id="program-title">Giáo án 4 buổi</h1>
      <p id="program-status">Đang tải dữ liệu…</p>
    </header>
    <div id="profile" class="profile"></div>
    <nav id="tabs" class="tabs" aria-label="Chọn buổi tập"></nav>
    <main id="main"></main>
    <footer>Bài thay thế được lưu làm mặc định trên thiết bị này. Mỗi card hiển thị cơ chính và cơ phụ của bài đang được chọn.</footer>
  </div>
  <div id="timer" class="timer" aria-live="polite">
    <div id="timer-value" class="timer-value">0:00</div>
    <div class="timer-copy"><b id="timer-title">Nghỉ giữa hiệp</b><span>Giữ nhịp thở ổn định</span></div>
    <button id="timer-stop" type="button">Dừng</button>
  </div>
  <script src="core.js?v=9"></script>
  <script src="exercises-1.js?v=8"></script>
  <script src="exercises-2.js?v=8"></script>
  <script src="details-1.js?v=8"></script>
  <script src="details-2.js?v=8"></script>
  <script src="variants.js?v=8"></script>
  <script src="replacements.js?v=8"></script>
  <script src="muscles.js?v=8"></script>
  <script src="app.js?v=8"></script>
  <script src="muscle-ui.js?v=8"></script>
  <script src="game-master.js?v=1"></script>
</body>
</html>
